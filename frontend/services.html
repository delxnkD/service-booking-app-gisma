<!DOCTYPE html>
<html>
<head>
  <title>Services</title>
  <link rel="stylesheet" href="css/style.css">

</head>
<body>
<div class="container">
  <h2>Available Services</h2>
  <div id="services" class="grid"></div>

  <h2 style="margin-top:40px;">Book a Service</h2>
</div>
  <form id="bookingForm">
    <label for="serviceSelect">Service:</label>
    <select id="serviceSelect" required></select><br><br>

    <label for="customerName">Your Name:</label>
    <input type="text" id="customerName" required><br><br>

    <label for="date">Date:</label>
    <input type="date" id="date" required><br><br>

    <button type="submit" class="btn">Book Service</button>
  </form>

  <div id="bookingMessage"></div>

 
<script src="js/navbar.js"></script>
<script src="js/auth.js"></script>
<script src="js/services.js"></script>
<script src="js/footer.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof requireLogin === 'function') {
      requireLogin();
    }
  });
</script>
</body>
</html>
